<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TB Tracker</title>
</head>

<body style="font-family:sans-serif;max-width:700px;margin:auto;">

<h1>📋 TB Tracker</h1>

<textarea id="input" placeholder="Вставь ДЗ сюда..." style="width:100%;height:150px;"></textarea>

<br><br> <button onclick="parseTasks()">Создать список</button>

<h2>📋 Задания</h2>
<div id="tasks"></div>

<h2>📝 Отчет</h2>
<textarea id="reportTemplate" style="width:100%;height:250px;">
#ИмяФамилия
Дата:

Сделано сегодня:
✅
✅
✅

3 положительных моментов дня:
1.
2.
3.

Инсайты:
1.
2.
3.

Ключевое действие на неделю:

Где я окажусь через год, сделав выбор в пользу этой задачи?

Где я сегодня проявил сопротивление?

Какие решения из состояния взрослого, какие - ребёнка?

Запрос: </textarea>

<script type="module">
// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ⚠️ ВСТАВЬ СВОИ ДАННЫЕ
const firebaseConfig = {
  apiKey: "AIzaSyA59vad0ucPu8COQ2_8C1TkIdmux22HuLU",
  authDomain: "pointbif20.firebaseapp.com",
  projectId: "pointbif20",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = "user1";

// 🔥 парсинг
window.parseTasks = async function() {
  const text = document.getElementById("input").value;

  const rawTasks = text.split(/\d️⃣/).filter(t => t.trim() !== "");

  const container = document.getElementById("tasks");
  container.innerHTML = "";

  rawTasks.forEach((t, i) => {
    let task = t.trim();

    // 🔗 ссылки
    task = task.replace(
      /(https?:\/\/[^\s]+)/g,
      '<a href="$1" target="_blank">Открыть</a>'
    );

    const important = task.includes("*");

    const style = important
      ? "background:#ffeaea;color:red;font-weight:bold;"
      : "";

    container.innerHTML += `
      <div style="
        border:1px solid #ccc;
        padding:12px;
        margin:10px 0;
        border-radius:12px;
        ${style}
      ">
        <input type="checkbox">
        <span contenteditable="true">${task}</span>
      </div>
    `;
  });

  // ☁️ сохраняем
  await setDoc(doc(db, "tasks", user), {
    text: text
  });
};

// 📥 загрузка при старте
window.onload = async () => {
  const ref = doc(db, "tasks", user);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const text = snap.data().text;
    document.getElementById("input").value = text;
    parseTasks();
  }
};
</script>

</body>
</html>
